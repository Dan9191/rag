server:
  port: ${SERVER_PORT:8094}

spring:
  application:
    name: rag
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/rag?currentSchema=rag1}
    username: ${DATASOURCE_NAME:rag_user}
    password: ${DATASOURCE_PASSWORD:rag_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    schemas: rag1
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  rag:
    rabbit:
      exchange: "article.exchange"
      routing-key: "article.outbox"
      queue: "article.outbox.queue"
    gigachat:
      embedding-model: ${EMBEDDING_MODEL:EmbeddingsGigaR}
      embedding-url: ${EMBEDDING_URL:https://gigachat.devices.sberbank.ru/api/v1/embeddings}
      secret-token: ${SECRET_TOKEN:}
      token-url: ${TOKEN_URL:https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      llm-url: ${LLM_URL:https://gigachat.devices.sberbank.ru/api/v1/chat/completions}
      llm-model: ${LLM_MODEL:GigaChat-2-Max}
    min-similarity: ${SECRET_TOKEN:0.50}